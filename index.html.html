<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Literacy Plan">
<meta name="theme-color" content="#2c5282">
<title>30-Day Literacy Plan</title>
<style>
  :root {
    --navy: #2c5282;
    --blue: #3a7bd5;
    --sage: #7aab8a;
    --sage-lt: #e8f4ec;
    --sand: #e6a84a;
    --rose: #d9727e;
    --sky: #5b9ec9;
    --plum: #8b6db5;
    --teal: #3ba8a0;
    --morn: #f59e0b;
    --midd: #3b82f6;
    --aftn: #22c55e;
    --evng: #8b5cf6;
    --bg: #f7f5f2;
    --card: #ffffff;
    --text: #1a1a2e;
    --mid: #6b7280;
    --border: #e5e7eb;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.4;
  }

  /* ── APP SHELL ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    background: var(--bg);
  }

  /* ── TOP BAR ── */
  #topbar {
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: white;
    padding: calc(var(--safe-top) + 12px) 16px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(44,82,130,.3);
  }

  #back-btn {
    width: 36px; height: 36px;
    border: none; background: rgba(255,255,255,.18);
    border-radius: 50%; color: white;
    font-size: 18px; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .15s;
  }
  #back-btn:active { background: rgba(255,255,255,.3); }
  #back-btn.visible { display: flex; }

  #topbar-center { flex: 1; min-width: 0; }
  #topbar-title { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #topbar-sub { font-size: 12px; opacity: .75; margin-top: 1px; }

  #today-btn {
    flex-shrink: 0;
    background: rgba(255,255,255,.2);
    border: 1.5px solid rgba(255,255,255,.4);
    border-radius: 20px; color: white;
    font-size: 12px; font-weight: 700;
    padding: 5px 12px; cursor: pointer;
    transition: background .15s;
  }
  #today-btn:active { background: rgba(255,255,255,.3); }

  /* ── SCROLL AREA ── */
  #scroll-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-bottom: calc(var(--safe-bot) + 80px);
  }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── HOME VIEW ── */
  #home-header {
    background: linear-gradient(135deg, var(--navy), var(--blue));
    padding: 20px 16px 28px;
    color: white;
    text-align: center;
  }
  #home-header h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  #home-header p { font-size: 13px; opacity: .8; }

  #today-card {
    margin: -18px 16px 0;
    background: white;
    border-radius: var(--radius);
    box-shadow: 0 4px 20px rgba(0,0,0,.12);
    overflow: hidden;
    cursor: pointer;
    transition: transform .1s, box-shadow .1s;
  }
  #today-card:active { transform: scale(.98); box-shadow: 0 2px 10px rgba(0,0,0,.1); }
  #today-card-banner {
    background: linear-gradient(135deg, var(--sage), #5b9e82);
    color: white;
    padding: 10px 16px;
    font-size: 11px; font-weight: 800;
    text-transform: uppercase; letter-spacing: .8px;
    display: flex; align-items: center; gap: 6px;
  }
  #today-card-body { padding: 14px 16px 16px; }
  #today-day-num { font-size: 36px; font-weight: 900; color: var(--navy); line-height: 1; }
  #today-theme { font-size: 19px; font-weight: 800; color: var(--text); margin-top: 2px; }
  #today-focus { font-size: 13px; color: var(--mid); margin-top: 4px; }
  #today-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .today-tag { background: var(--sage-lt); color: #2d6a4f; border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 700; }
  #today-arrow { color: var(--sage); font-size: 13px; font-weight: 700; margin-top: 12px; display: flex; align-items: center; gap: 4px; }

  /* Progress bar */
  #progress-section { margin: 16px; }
  #progress-label { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; color: var(--mid); margin-bottom: 6px; }
  #progress-bar-track { background: var(--border); border-radius: 8px; height: 8px; overflow: hidden; }
  #progress-bar-fill { background: linear-gradient(90deg, var(--sage), var(--teal)); height: 100%; border-radius: 8px; transition: width .4s; }

  /* Week sections */
  .week-section { margin: 8px 0; }
  .week-header {
    padding: 10px 16px 6px;
    font-size: 12px; font-weight: 800;
    text-transform: uppercase; letter-spacing: .6px;
    color: var(--mid);
  }
  .days-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 0 16px; }
  .day-pill {
    aspect-ratio: 1;
    border-radius: 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 13px; font-weight: 700;
    transition: transform .1s;
    position: relative;
    background: white;
    border: 1.5px solid var(--border);
    color: var(--text);
  }
  .day-pill:active { transform: scale(.93); }
  .day-pill.today { background: linear-gradient(135deg, var(--navy), var(--blue)); color: white; border-color: transparent; }
  .day-pill.done { background: var(--sage-lt); color: #2d6a4f; border-color: #bbf7d0; }
  .day-pill .dp-num { font-size: 15px; font-weight: 800; }
  .day-pill .dp-theme { font-size: 7px; font-weight: 600; text-align: center; line-height: 1.1; opacity: .7; padding: 0 2px; max-width: 100%; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; display: none; }
  .done-tick { position: absolute; top: 3px; right: 3px; font-size: 8px; }

  /* ── DAY VIEW ── */
  .day-hero {
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: white;
    padding: 16px 16px 20px;
  }
  .day-hero-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
  .day-num-badge { background: rgba(255,255,255,.15); border: 2px solid rgba(255,255,255,.3); border-radius: 12px; padding: 6px 12px; text-align: center; flex-shrink: 0; }
  .day-num-badge .big { font-size: 28px; font-weight: 900; line-height: 1; }
  .day-num-badge .small { font-size: 10px; opacity: .7; }
  .day-hero-info { flex: 1; }
  .day-hero-theme { font-size: 20px; font-weight: 900; line-height: 1.2; }
  .day-hero-focus { font-size: 12px; opacity: .8; margin-top: 4px; line-height: 1.4; }
  .day-hero-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .hero-tag { background: rgba(255,255,255,.18); border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 600; }

  /* Goals strip */
  .goals-strip { background: white; border-bottom: 1px solid var(--border); padding: 12px 16px; }
  .strip-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; color: var(--mid); margin-bottom: 6px; }
  .goals-list { display: flex; flex-direction: column; gap: 4px; }
  .goal-item { display: flex; align-items: flex-start; gap: 6px; font-size: 13px; }
  .goal-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--sage); flex-shrink: 0; margin-top: 4px; }

  /* Section tabs */
  #day-tabs {
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
    gap: 4px;
    padding: 10px 16px 6px;
    background: white;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  #day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px; font-weight: 700;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--mid);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .day-tab.active { background: var(--navy); color: white; border-color: var(--navy); }

  /* Day section content */
  .day-section { padding: 0 16px 12px; display: none; }
  .day-section.active { display: block; }

  /* Resources section */
  .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .res-card { background: white; border-radius: 12px; padding: 10px 12px; border: 1px solid var(--border); }
  .res-card-title { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .res-card-title.bk { color: var(--rose); }
  .res-card-title.ty { color: var(--sky); }
  .res-card-title.mu { color: var(--plum); }
  .res-card-title.ot { color: var(--sage); }
  .res-item { font-size: 12px; padding: 3px 0; color: var(--text); border-bottom: 1px solid #f3f4f6; display: flex; align-items: flex-start; gap: 5px; line-height: 1.3; }
  .res-item:last-child { border-bottom: none; }
  .res-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .res-dot.bk { background: var(--rose); }
  .res-dot.ty { background: var(--sky); }
  .res-dot.mu { background: var(--plum); }
  .res-dot.ot { background: var(--sage); }

  /* Schedule section */
  .schedule-list { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
  .sched-item { background: white; border-radius: 12px; padding: 12px; border: 1px solid var(--border); display: flex; gap: 10px; }
  .sched-icon-wrap { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .sched-icon-wrap.m { background: #fef3c7; }
  .sched-icon-wrap.d { background: #dbeafe; }
  .sched-icon-wrap.a { background: #dcfce7; }
  .sched-icon-wrap.e { background: #ede9fe; }
  .sched-time { font-size: 11px; color: var(--mid); font-weight: 600; }
  .sched-title { font-size: 14px; font-weight: 800; margin-top: 1px; }
  .sched-detail { font-size: 12px; color: var(--mid); margin-top: 2px; line-height: 1.3; }

  /* Activity cards */
  .session-block { margin-top: 14px; }
  .session-label {
    font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .6px;
    color: white; padding: 5px 12px; border-radius: 20px; display: inline-flex;
    align-items: center; gap: 5px; margin-bottom: 8px;
  }
  .session-label.m { background: var(--morn); }
  .session-label.d { background: var(--midd); }
  .session-label.a { background: var(--aftn); }
  .session-label.e { background: var(--evng); }
  .act-cards { display: flex; flex-direction: column; gap: 8px; }
  .act-card {
    background: white; border-radius: 14px; border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .act-card-header {
    padding: 12px 14px 10px;
    display: flex; align-items: flex-start; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .act-num-badge {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 13px; color: white; flex-shrink: 0;
  }
  .act-num-badge.m { background: var(--morn); }
  .act-num-badge.d { background: var(--midd); }
  .act-num-badge.a { background: var(--aftn); }
  .act-num-badge.e { background: var(--evng); }
  .act-header-text { flex: 1; }
  .act-title { font-size: 15px; font-weight: 800; line-height: 1.2; }
  .act-meta { font-size: 11px; color: var(--mid); margin-top: 2px; }
  .act-icon { font-size: 22px; flex-shrink: 0; }
  /* expandable body */
  .act-body { display: none; }
  .act-card.open .act-body { display: block; }
  .act-expand-hint {
    padding: 8px 14px;
    font-size: 12px; color: var(--mid); font-weight: 600;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
  }
  .act-card.open .act-expand-hint { border-bottom: 1px solid var(--border); }
  .expand-arrow { transition: transform .2s; font-size: 10px; }
  .act-card.open .expand-arrow { transform: rotate(180deg); }

  .act-steps-section { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .act-steps-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; color: var(--mid); margin-bottom: 8px; }
  .step-row { display: flex; gap: 8px; padding: 5px 0; align-items: flex-start; }
  .step-num { width: 20px; height: 20px; border-radius: 50%; background: #f3f4f6; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: var(--mid); flex-shrink: 0; margin-top: 1px; }
  .step-text { font-size: 13px; line-height: 1.4; }

  .act-lang-section { padding: 10px 14px; background: #fafaf8; }
  .act-lang-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; color: var(--mid); margin-bottom: 6px; }
  .lang-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .lang-chip { background: var(--sage-lt); color: #2d6a4f; border-radius: 8px; padding: 4px 9px; font-size: 12px; font-weight: 700; }

  .act-goal { padding: 8px 14px; background: #fafaf8; border-top: 1px solid var(--border); font-size: 12px; color: var(--mid); }
  .act-goal strong { color: var(--text); }

  /* Words & Phrases section */
  .words-section { margin-top: 10px; }
  .words-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
  .word-chip { background: var(--sage-lt); color: #2d6a4f; border-radius: 10px; padding: 8px 6px; text-align: center; font-size: 13px; font-weight: 700; }
  .phrases-list { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
  .phrase-row { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .phrase-row:last-child { border-bottom: none; }
  .phrase-emoji { font-size: 14px; flex-shrink: 0; }
  .signs-box { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 12px 14px; margin-top: 8px; }
  .signs-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; color: var(--mid); margin-bottom: 6px; }
  .signs-text { font-size: 13px; }

  /* Tips section */
  .tips-list { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
  .tip-card { background: white; border-radius: 12px; padding: 12px 14px; border: 1px solid var(--border); font-size: 13px; line-height: 1.4; display: flex; gap: 8px; }
  .tip-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .adapt-card { background: #eff6ff; border-color: #bfdbfe; }

  /* Mark complete button */
  .complete-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: calc(100% - 32px); margin: 14px 16px 0;
    padding: 14px;
    border-radius: 14px; border: none;
    font-size: 15px; font-weight: 800; cursor: pointer;
    transition: all .15s;
  }
  .complete-btn.not-done { background: var(--sage); color: white; }
  .complete-btn.done { background: var(--sage-lt); color: #2d6a4f; border: 2px solid #bbf7d0; }
  .complete-btn:active { transform: scale(.97); }

  /* ── BOTTOM NAV ── */
  #bottom-nav {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 calc(var(--safe-bot) + 4px);
    z-index: 20;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    background: none; border: none;
    color: var(--mid); cursor: pointer;
    padding: 4px 0;
    font-size: 10px; font-weight: 600;
    transition: color .15s;
  }
  .nav-btn.active { color: var(--navy); }
  .nav-icon { font-size: 22px; }

  /* ── SECTION HEADERS ── */
  .section-header {
    padding: 14px 0 8px;
    font-size: 14px; font-weight: 800;
    color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .section-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── ALL DAYS VIEW ── */
  #all-view { padding: 16px; }
  .all-week { margin-bottom: 20px; }
  .all-week-title { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; color: var(--mid); margin-bottom: 8px; }
  .all-days-list { display: flex; flex-direction: column; gap: 6px; }
  .all-day-row {
    background: white; border-radius: 12px; padding: 12px 14px;
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: all .1s;
  }
  .all-day-row:active { transform: scale(.98); background: var(--sage-lt); }
  .all-day-row.today { border-color: var(--navy); border-width: 2px; background: #f0f4ff; }
  .all-day-row.done { border-color: #bbf7d0; background: var(--sage-lt); }
  .adr-day { font-size: 20px; font-weight: 900; color: var(--navy); width: 32px; flex-shrink: 0; }
  .adr-info { flex: 1; }
  .adr-theme { font-size: 14px; font-weight: 700; }
  .adr-focus { font-size: 12px; color: var(--mid); margin-top: 1px; }
  .adr-right { color: var(--mid); font-size: 12px; }
  .adr-right.done-mark { color: var(--sage); font-size: 18px; }

  /* Misc */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--mid); }
  .empty-state .es-icon { font-size: 48px; margin-bottom: 12px; }
  
  /* Add to homescreen banner */
  #install-banner {
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: white; padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    font-size: 13px;
  }
  #install-banner.hidden { display: none; }
  #install-banner button { background: white; color: var(--navy); border: none; border-radius: 8px; padding: 5px 12px; font-weight: 800; font-size: 12px; cursor: pointer; flex-shrink: 0; }
  #install-close { background: none; border: none; color: rgba(255,255,255,.7); font-size: 18px; cursor: pointer; margin-left: auto; flex-shrink: 0; }
</style>
</head>
<body>
<div id="app">
  <!-- Top bar -->
  <div id="topbar">
    <button id="back-btn" onclick="goHome()">&#8249;</button>
    <div id="topbar-center">
      <div id="topbar-title">🌱 Literacy Plan</div>
      <div id="topbar-sub">Ages 18–20 months</div>
    </div>
    <button id="today-btn" onclick="goToToday()">Today</button>
  </div>

  <!-- Install banner (iOS) -->
  <div id="install-banner" class="hidden">
    <span>📱</span>
    <span>Add to Home Screen for the best experience</span>
    <button onclick="document.getElementById('install-banner').classList.add('hidden')">Got it</button>
    <button id="install-close" onclick="document.getElementById('install-banner').classList.add('hidden')">✕</button>
  </div>

  <!-- Scrollable content -->
  <div id="scroll-area">
    <!-- HOME VIEW -->
    <div id="home-view" class="view active">
      <div id="home-header">
        <h1>30-Day Literacy Plan</h1>
        <p>Your personalised early literacy curriculum</p>
      </div>

      <!-- Today card -->
      <div id="today-card" onclick="openDay(todayDayNum)">
        <div id="today-card-banner">✨ TODAY</div>
        <div id="today-card-body">
          <div id="today-day-num">Day 1</div>
          <div id="today-theme">Loading...</div>
          <div id="today-focus"></div>
          <div id="today-tags"></div>
          <div id="today-arrow">Tap to open today's plan →</div>
        </div>
      </div>

      <!-- Progress -->
      <div id="progress-section">
        <div id="progress-label">
          <span id="prog-text">Progress</span>
          <span id="prog-count">0 / 30 days</span>
        </div>
        <div id="progress-bar-track">
          <div id="progress-bar-fill" style="width:0%"></div>
        </div>
      </div>

      <!-- Week grids -->
      <div id="week-grids"></div>
    </div>

    <!-- DAY VIEW -->
    <div id="day-view" class="view">
      <div class="day-hero" id="day-hero"></div>
      <div class="goals-strip" id="day-goals"></div>
      <div id="day-tabs"></div>
      <div id="day-sections"></div>

        <span id="complete-icon">✓</span>

// ── STATE ──
let currentView = 'home';
let currentDay = null;
let currentTab = 0;
let completedDays = new Set(JSON.parse(localStorage.getItem('completedDays') || '[]'));
let todayDayNum = parseInt(localStorage.getItem('todayDay') || '1');

// ── INIT ──
function init() {
  renderHome();
  renderAllDays();
  // Show iOS install hint
  const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  const isStandalone = window.navigator.standalone;
  if (isIOS && !isStandalone && !localStorage.getItem('installHintDismissed')) {
    document.getElementById('install-banner').classList.remove('hidden');
  }
}

// ── HOME ──
function renderHome() {
  const day = DAYS[todayDayNum - 1];
  if (!day) return;
  
  document.getElementById('today-day-num').textContent = 'Day ' + day.day;
  document.getElementById('today-theme').textContent = day.theme;
  document.getElementById('today-focus').textContent = day.focus;
  
  const tags = document.getElementById('today-tags');
  tags.innerHTML = '';
  [day.theme, day.concept].filter(Boolean).forEach(t => {
    const el = document.createElement('div');
    el.className = 'today-tag';
    el.textContent = t;
    tags.appendChild(el);
  });
  
  const done = completedDays.size;
  document.getElementById('prog-text').textContent = done === 0 ? 'Just getting started!' : done === 30 ? '🎉 All done!' : 'Keep going!';
  document.getElementById('prog-count').textContent = done + ' / 30 days';
  document.getElementById('progress-bar-fill').style.width = (done / 30 * 100) + '%';
  
  renderWeekGrids();
}

function renderWeekGrids() {
  const container = document.getElementById('week-grids');
  let html = '';
  for (let w = 1; w <= 5; w++) {
    const weekDays = DAYS.filter(d => d.week === w);
    html += '<div class="week-section">';
    html += '<div class="week-header">Week ' + w + ' — ' + getWeekTheme(w) + '</div>';
    html += '<div class="days-row">';
    weekDays.forEach(d => {
      const isToday = d.day === todayDayNum;
      const isDone = completedDays.has(d.day);
      let cls = 'day-pill';
      if (isToday) cls += ' today';
      else if (isDone) cls += ' done';
      html += '<div class="' + cls + '" onclick="openDay(' + d.day + ')">';
      html += '<span class="dp-num">' + d.day + '</span>';
      if (isDone && !isToday) html += '<span class="done-tick">✓</span>';
      html += '</div>';
    });
    html += '</div></div>';
  }
  container.innerHTML = html;
}

function getWeekTheme(w) {
  const themes = {1:'Animals & Colours',2:'Farm, Music & Ocean',3:'Letters & Stories',4:'Community & Imagination',5:'Blending & Seasons'};
  return themes[w] || 'Week ' + w;
}

// ── DAY VIEW ──
function openDay(dayNum) {
  const day = DAYS[dayNum - 1];
  if (!day) return;
  currentDay = day;
  currentTab = 0;

        <div class="act-cards">
          ${sess.cards.map((card, ci) => `
            <div class="act-card" id="card-${si}-${ci}">
              <div class="act-card-header" onclick="toggleCard('card-${si}-${ci}')">
                <div class="act-num-badge ${sessColours[si]}">${ci+1}</div>
                <div class="act-header-text">
                  <div class="act-title">${card.title}</div>
                  <div class="act-meta">${card.meta}</div>
                </div>
                <div class="act-icon">${card.icon}</div>
              </div>
              <div class="act-expand-hint" onclick="toggleCard('card-${si}-${ci}')">
                <span>Tap for steps & language</span>
                <span class="expand-arrow">▼</span>
              </div>
              <div class="act-body">
                <div class="act-steps-section">
                  <div class="act-steps-label">Step-by-Step</div>
                  ${card.steps.map((step, si2) => `
                    <div class="step-row">
                      <div class="step-num">${si2+1}</div>
                      <div class="step-text">${step}</div>
                    </div>
                  `).join('')}
                </div>
                ${card.language.length ? `
                  <div class="act-lang-section">
                    <div class="act-lang-label">💬 Language to Use</div>
                    <div class="lang-chips">
                      ${card.language.map(l => `<span class="lang-chip">${l}</span>`).join('')}
                    </div>
                  </div>
                ` : ''}
                ${card.goal ? `<div class="act-goal"><strong>Goal:</strong> ${card.goal}</div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('')}
  </div>`;
  
  // Words & Phrases
  sectHTML += `<div class="day-section" id="sect-3">
    <div class="section-header">Words & Phrases</div>
    <div class="words-section">
      <div class="strip-label">Words of the Day</div>
      <div class="words-grid">
        ${day.words.map(w => `<div class="word-chip">${w}</div>`).join('')}
      </div>
      <div class="strip-label">Simple Phrases to Use</div>
      <div class="phrases-list">
        ${day.phrases.map(p => `<div class="phrase-row"><span class="phrase-emoji">💬</span>${p}</div>`).join('')}
      </div>
      ${day.signs ? `
        <div class="signs-box">
          <div class="signs-label">Signs to Use</div>
          <div class="signs-text">${day.signs}</div>
        </div>
      ` : ''}
    </div>
  </div>`;
  
  // Tips
  sectHTML += `<div class="day-section" id="sect-4">
    <div class="section-header">Support Tips</div>
    <div class="tips-list">
      ${day.tips.map(t => `<div class="tip-card"><span class="tip-icon">✅</span>${t}</div>`).join('')}
    </div>
    ${day.adapt.length ? `
      <div class="section-header" style="margin-top:12px">Adapt & Extend</div>
      <div class="tips-list">
        ${day.adapt.map(t => `<div class="tip-card adapt-card"><span class="tip-icon">→</span>${t}</div>`).join('')}
      </div>
    ` : ''}
  </div>`;
  
  document.getElementById('day-sections').innerHTML = sectHTML;
  
  // Complete button
  updateCompleteBtn();
  
  // Navigation
  document.getElementById('back-btn').classList.add('visible');
  document.getElementById('topbar-title').textContent = 'Day ' + day.day + ' · ' + day.theme;
  document.getElementById('topbar-sub').textContent = 'Week ' + day.week;
  
  showView('day');
  document.getElementById('scroll-area').scrollTop = 0;
}

function switchTab(idx) {
  currentTab = idx;
  document.querySelectorAll('.day-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.day-section').forEach((s,i) => s.classList.toggle('active', i===idx));
  document.getElementById('scroll-area').scrollTop = 0;
}

function toggleCard(id) {
  const card = document.getElementById(id);
  if (card) card.classList.toggle('open');
}

function updateCompleteBtn() {
  const isDone = currentDay && completedDays.has(currentDay.day);
  const btn = document.getElementById('complete-btn');
  const icon = document.getElementById('complete-icon');
  const text = document.getElementById('complete-text');
  btn.className = 'complete-btn ' + (isDone ? 'done' : 'not-done');
  icon.textContent = isDone ? '✓' : '✓';
  text.textContent = isDone ? 'Day Completed! ✨' : 'Mark Day Complete';
}

function toggleComplete() {
  if (!currentDay) return;
  const d = currentDay.day;
  if (completedDays.has(d)) {
    completedDays.delete(d);
  } else {
    completedDays.add(d);
    // Auto-advance todayDayNum
    if (d === todayDayNum && todayDayNum < 30) {
      todayDayNum = d + 1;
      localStorage.setItem('todayDay', todayDayNum);
    }
  }
  localStorage.setItem('completedDays', JSON.stringify([...completedDays]));
  updateCompleteBtn();
  renderHome();
}

// ── ALL DAYS VIEW ──
function renderAllDays() {
  let html = '';
  for (let w = 1; w <= 5; w++) {
    const weekDays = DAYS.filter(d => d.week === w);
    html += `<div class="all-week">
      <div class="all-week-title">Week ${w} — ${getWeekTheme(w)}</div>
      <div class="all-days-list">`;
    weekDays.forEach(d => {
      const isToday = d.day === todayDayNum;
      const isDone = completedDays.has(d.day);
      let cls = 'all-day-row';
      if (isToday) cls += ' today';
      else if (isDone) cls += ' done';
      html += `<div class="${cls}" onclick="openDay(${d.day})">
        <div class="adr-day">${d.day}</div>
        <div class="adr-info">
          <div class="adr-theme">${d.theme}</div>
          <div class="adr-focus">${d.focus.substring(0,55)}${d.focus.length>55?'…':''}</div>
        </div>
        <div class="adr-right ${isDone?'done-mark':''}">${isDone ? '✓' : isToday ? '→' : '›'}</div>
      </div>`;
    });
    html += '</div></div>';
  }
  document.getElementById('all-view').innerHTML = html;
}

// ── NAVIGATION ──
function showView(name) {
  currentView = name;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(name + '-view').classList.add('active');
  
  ['home','all'].forEach(n => document.getElementById('nav-'+n)?.classList.remove('active'));
  if (name === 'home') document.getElementById('nav-home').classList.add('active');
  else if (name === 'all') document.getElementById('nav-all').classList.add('active');
  
  const showBack = name === 'day';
  document.getElementById('back-btn').classList.toggle('visible', showBack);
  
  if (name === 'home') {
    document.getElementById('topbar-title').textContent = '🌱 Literacy Plan';
    document.getElementById('topbar-sub').textContent = 'Ages 18–20 months';
    renderHome();
    renderAllDays();
  } else if (name === 'all') {
    document.getElementById('topbar-title').textContent = 'All 30 Days';
    document.getElementById('topbar-sub').textContent = 'Tap any day to open';
    renderAllDays();
  }
}

function showAllDays() {
  showView('all');
  document.getElementById('nav-all').classList.add('active');
}

function goHome() {
  showView('home');
}

function goToToday() {
  openDay(todayDayNum);
}

init();
</script>
</body>
</html>
